<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Loading…</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    color: #fff;
    -webkit-app-region: drag;
    user-select: none;
  }
  .stage {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: grid;
    place-items: center;
    background:
      radial-gradient(1200px 600px at 20% 0%, rgba(124,58,237,0.45), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(245,158,11,0.35), transparent 60%),
      linear-gradient(135deg, #0b0d10 0%, #14151c 60%, #1a1430 100%);
    border-radius: 16px;
    overflow: hidden;
  }
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    pointer-events: none;
  }
  .card {
    position: relative;
    text-align: center;
    padding: 0 36px;
  }
  .logo {
    width: 96px;
    height: 96px;
    margin: 0 auto 22px;
    border-radius: 22px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed 50%, #f59e0b);
    display: grid;
    place-items: center;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1),
      0 20px 60px -10px rgba(124,58,237,0.55);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .logo svg { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35)); }
  .brand {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .tagline {
    margin-top: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.2px;
  }
  .progress {
    width: 220px;
    height: 4px;
    margin: 28px auto 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress::after {
    content: "";
    display: block;
    height: 100%;
    width: 35%;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    border-radius: 999px;
    animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(360%); }
  }
  .status {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .version {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-family: ui-monospace, monospace;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="logo">
        <svg width="56" height="56" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(174,76) rotate(28)">
            <rect x="-6" y="0" width="12" height="110" rx="4" fill="#fff"/>
            <rect x="-30" y="-22" width="60" height="32" rx="6" fill="#fff"/>
            <rect x="22" y="-18" width="14" height="24" rx="3" fill="#fde68a"/>
          </g>
        </svg>
      </div>
      <div class="brand">Hardware POS</div>
      <div class="tagline">Offline-first · Built for the shop floor</div>
      <div class="progress"></div>
      <div class="status">Loading…</div>
    </div>
    <div class="version">v0.1.0</div>
  </div>
</body>
</html>
